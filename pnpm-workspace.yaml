packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@fontsource/instrument-serif": ^5.2.8
  "@fontsource/inter": ^5.2.8
  "@tailwindcss/postcss": ^4.2.2
  "@tailwindcss/vite": ^4.2.2
  "@types/node": ^24
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.1
  i18next: ^26.0.3
  next: ^15.5.6
  next-i18next: ^16.0.5
  react: ^19.2.4
  react-dom: ^19.2.4
  react-grab: ^0.1.29
  react-i18next: ^17.0.2
  tailwindcss: ^4.2.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
